<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel de Pedidos</title>

<style>
body{
  font-family: Arial;
  padding:40px;
}

.container{
  display:flex;
  gap:20px;
}

.coluna{
  flex:1;
  background:#f5f5f5;
  padding:15px;
  border-radius:8px;
}

.pedido{
  background:white;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  border-radius:5px;
}
</style>

</head>

<body>

<h1>Painel da Loja</h1>

<div class="container">

<div class="coluna">
<h2>PENDENTE</h2>
<div id="pendente"></div>
</div>

<div class="coluna">
<h2>PRONTO</h2>
<div id="pronto"></div>
</div>

<div class="coluna">
<h2>ENTREGA</h2>
<div id="entrega"></div>
</div>

<div class="coluna">
<h2>FINALIZADO</h2>
<div id="finalizado"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = window.supabase.createClient(
  "https://ffmtqfjafolydcdaldap.supabase.co",
  "sb_publishable_BoUeyott9mr3wpDRS4VP7g_mn7mAQx_"
)

let totalPedidosAnterior = 0

async function carregarPedidos(){

  const { data, error } = await supabaseClient
    .from('pedidos')
    .select('*')
    .order('id', { ascending: false })

  if(error){
    console.error(error)
    return
  }

  if(data.length > totalPedidosAnterior && totalPedidosAnterior !== 0){
    tocarSomNovoPedido()
  }

  totalPedidosAnterior = data.length

  document.getElementById("pendente").innerHTML = ""
  document.getElementById("pronto").innerHTML = ""
  document.getElementById("entrega").innerHTML = ""
  document.getElementById("finalizado").innerHTML = ""

  data.forEach(p => {

    let itensHTML = ""

    let itens = p.itens

    if(typeof itens === "string"){
      try{
        itens = JSON.parse(itens)
      }catch(e){
        console.error("Erro ao converter itens:", e)
        itens = []
      }
    }

    if(Array.isArray(itens)){
      itens.forEach(i => {

        const sub = Number(i.preco || 0) * Number(i.qtd || 0)
        let txtPresente = Number(i.presenteQtd || 0) > 0
          ? ` (🎁 ${i.presenteQtd} para presente)`
          : ""

        itensHTML += `• (${i.qtd}x) ${i.nome}${txtPresente} - R$ ${sub.toFixed(2).replace('.', ',')}<br>`

      })
    }

    let html = `
    <div class="pedido">
      <b>Pedido:</b> ${p.code} <br>

      <b>Itens:</b><br>
      ${itensHTML || "Sem itens"}<br>

      <b>Total:</b> R$ ${Number(p.total || 0).toFixed(2).replace('.', ',')} <br>
      <b>Endereço:</b> ${p.endereco || "-"} <br>
    `

    if(p.status === "PENDENTE"){
      html += `<br>
      <button onclick="marcarPronto('${p.code}','${p.token_confirmacao}')">
      Preparado
      </button>`
    }

    if(p.status === "PRONTO"){
      html += `<br>
      <button onclick="mudarStatus('${p.code}','ENTREGA')">
      Uber pegou
      </button>`
    }

    if(p.status === "ENTREGA"){
      html += `<br>
      <button onclick="mudarStatus('${p.code}','FINALIZADO')">
      Entregue
      </button>`
    }

    html += "</div>"

    const coluna = document.getElementById((p.status || "").toLowerCase())
    if(coluna){
      coluna.innerHTML += html
    }

  })
}

async function marcarPronto(codigo, token){

  const r = await fetch("/api/confirmar",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ codigo, token })
  })

  const j = await r.json()

  if(!j.sucesso){
    alert("Erro ao atualizar")
    return
  }

  carregarPedidos()
}

async function mudarStatus(codigo, status){

  const { error } = await supabaseClient
    .from('pedidos')
    .update({ status: status })
    .eq('code', codigo)

  if(error){
    alert("Erro ao atualizar")
    return
  }

  carregarPedidos()
}

function tocarSomNovoPedido(){
  const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
  )
  audio.play()
}

carregarPedidos()
setInterval(carregarPedidos, 5000)

</script>

</body>
</html>
