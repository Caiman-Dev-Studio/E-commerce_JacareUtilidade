<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pendente | Jacare Utilidades</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, Arial, sans-serif;
            background: #fff8ef;
            color: #4d3a1d;
        }

        .box {
            width: min(92vw, 520px);
            padding: 40px 28px;
            border-radius: 24px;
            background: #fff;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .status {
            width: 82px;
            height: 82px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #fff1d8;
            color: #b77900;
            font-size: 2rem;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 10px;
            color: #b77900;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #6f5a39;
        }

        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 26px;
            border-radius: 12px;
            background: #008037;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="box">
        <div class="status">...</div>
        <h1>Pagamento pendente</h1>
        <p>Recebemos seu pedido, mas o pagamento ainda esta em analise ou aguardando confirmacao.</p>
        <a class="btn" href="/">Voltar para a loja</a>
    </main>
</body>
</html>
