<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Aprovado | Jacaré Utilidades</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: #f0faf4;
    }
    .box {
      text-align: center;
      padding: 50px 30px;
      max-width: 480px;
    }
    .icon { font-size: 80px; }
    h1 { color: #008037; font-size: 2rem; margin: 16px 0 8px; }
    p { color: #444; font-size: 1rem; line-height: 1.5; }
    .code {
      background: #e6f7ee;
      border: 1px solid #a8e0bf;
      color: #00673a;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      display: inline-block;
      margin: 16px 0;
    }
    a.btn {
      display: inline-block;
      margin-top: 20px;
      background: #008037;
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✅</div>
    <h1>Pagamento Aprovado!</h1>
    <p>Seu pedido foi confirmado e já está sendo preparado. Em breve entraremos em contato.</p>
    <div class="code" id="cod-pedido"></div>
    <br>
    <a href="/" class="btn">🐊 Voltar à loja</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pedido = params.get('pedido');
    if (pedido) {
      document.getElementById('cod-pedido').textContent = '🆔 ' + pedido;
    }
  </script>
</body>
</html>
